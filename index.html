<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Recipe Inspirations</title>
<style>
  /* в”Ђв”Ђ Reset & Base в”Ђв”Ђ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream:    #faf6f0;
    --parchment:#f2ead8;
    --warm:     #e8d5b7;
    --terracotta: #c4714a;
    --terra-dk: #a05535;
    --sage:     #7a9e7e;
    --sage-lt:  #c8ddc9;
    --ink:      #2e2212;
    --ink-md:   #5a4832;
    --ink-lt:   #8a7460;
    --border:   #d9c9aa;
    --white:    #ffffff;
    --shadow:   0 2px 12px rgba(46,34,18,.10);
    --shadow-lg:0 6px 28px rgba(46,34,18,.16);
    --radius:   14px;
    --radius-sm:8px;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* в”Ђв”Ђ Header в”Ђв”Ђ */
  header {
    background: var(--white);
    border-bottom: 2px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-size: 1.25rem; font-weight: 700; color: var(--terracotta);
  }
  .logo-icon { font-size: 1.6rem; }
  .logo-sub { font-size: 0.75rem; font-weight: 400; color: var(--ink-lt); letter-spacing: .05em; display: block; margin-top:-2px; }

  .header-actions { display: flex; gap: 10px; align-items: center; }
  .btn-icon {
    background: none; border: none; cursor: pointer;
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; color: var(--ink-lt);
    transition: background .15s;
  }
  .btn-icon:hover { background: var(--parchment); color: var(--ink); }

  /* в”Ђв”Ђ Nav Tabs в”Ђв”Ђ */
  nav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex;
    padding: 0 24px;
    gap: 4px;
  }
  .tab {
    padding: 12px 20px;
    border: none; background: none; cursor: pointer;
    font-size: .92rem; font-weight: 500; color: var(--ink-lt);
    border-bottom: 3px solid transparent;
    transition: all .15s;
    margin-bottom: -1px;
  }
  .tab.active { color: var(--terracotta); border-bottom-color: var(--terracotta); }
  .tab:hover:not(.active) { color: var(--ink); background: var(--parchment); }
  .tab-count {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--sage-lt); color: var(--sage);
    border-radius: 20px; font-size: .72rem; font-weight: 700;
    padding: 1px 7px; margin-left: 6px;
  }

  /* в”Ђв”Ђ Main Layout в”Ђв”Ђ */
  main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  /* в”Ђв”Ђ View panels в”Ђв”Ђ */
  .view { display: none; }
  .view.active { display: block; }

  /* в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
     ADD INSPIRATION VIEW
  в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ */
  .add-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 700px) { .add-grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 1rem; font-weight: 700; color: var(--ink);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .card-title-icon { font-size: 1.15rem; }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    background: var(--parchment);
    position: relative;
    min-height: 200px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--terracotta);
    background: #fdeee6;
  }
  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 2.4rem; }
  .upload-hint { color: var(--ink-lt); font-size: .88rem; }
  .upload-hint strong { color: var(--terracotta); }

  .preview-img {
    width: 100%; border-radius: var(--radius-sm);
    display: block; object-fit: cover; max-height: 280px;
  }
  .preview-wrap { position: relative; }
  .preview-remove {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,.55); color: #fff; border: none;
    border-radius: 50%; width: 28px; height: 28px; cursor: pointer;
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .preview-remove:hover { background: rgba(196,113,74,.9); }

  /* Form fields */
  label { display: block; font-size: .85rem; font-weight: 600; color: var(--ink-md); margin-bottom: 5px; }
  input[type=text], textarea, select {
    width: 100%; padding: 10px 13px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-size: .92rem; color: var(--ink);
    background: var(--white);
    transition: border-color .15s;
    font-family: inherit;
  }
  input[type=text]:focus, textarea:focus, select:focus {
    outline: none; border-color: var(--terracotta);
  }
  textarea { resize: vertical; min-height: 90px; line-height: 1.5; }

  .field { margin-bottom: 16px; }

  /* Tags input */
  .tags-wrap {
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    background: var(--white); min-height: 44px;
    display: flex; flex-wrap: wrap; gap: 6px; padding: 7px 10px;
    cursor: text; transition: border-color .15s;
  }
  .tags-wrap:focus-within { border-color: var(--terracotta); }
  .tag-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--sage-lt); color: var(--sage);
    border-radius: 20px; padding: 3px 10px; font-size: .8rem; font-weight: 600;
  }
  .tag-chip button {
    background: none; border: none; cursor: pointer; color: var(--sage);
    font-size: .85rem; line-height: 1; padding: 0;
  }
  .tag-chip button:hover { color: var(--terracotta); }
  .tags-input {
    border: none; outline: none; font-size: .88rem; color: var(--ink);
    background: transparent; min-width: 100px; flex: 1; padding: 2px 0;
  }
  .tag-hint { font-size: .78rem; color: var(--ink-lt); margin-top: 4px; }

  /* Category selector */
  .category-pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill {
    padding: 5px 14px; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--white);
    font-size: .82rem; font-weight: 500; color: var(--ink-md);
    cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .pill:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .pill.selected { background: var(--terracotta); border-color: var(--terracotta); color: white; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: var(--radius-sm);
    font-size: .92rem; font-weight: 600; cursor: pointer;
    border: none; transition: all .15s; font-family: inherit;
  }
  .btn-primary { background: var(--terracotta); color: white; }
  .btn-primary:hover { background: var(--terra-dk); }
  .btn-primary:disabled { background: #d4b8a8; cursor: not-allowed; }
  .btn-secondary {
    background: var(--white); color: var(--ink-md);
    border: 1.5px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--terracotta); color: var(--terracotta); background: #fdeee6; }
  .btn-ai {
    background: linear-gradient(135deg, #7c4dff 0%, #448aff 100%);
    color: white;
  }
  .btn-ai:hover { opacity: .9; }
  .btn-ai:disabled { opacity: .5; cursor: not-allowed; }
  .btn-sm { padding: 6px 14px; font-size: .82rem; }
  .btn-danger { background: #fff0ee; color: #c0392b; border: 1.5px solid #f5c6c2; }
  .btn-danger:hover { background: #fde8e5; }

  .form-actions { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }

  /* AI Analysis panel */
  .ai-panel {
    background: linear-gradient(135deg, #f5f0ff 0%, #eff6ff 100%);
    border: 1.5px solid #c4b5fd;
    border-radius: var(--radius);
    padding: 20px;
    margin-top: 20px;
    display: none;
  }
  .ai-panel.visible { display: block; }
  .ai-panel-title {
    font-size: .95rem; font-weight: 700; color: #5b21b6;
    margin-bottom: 14px; display: flex; align-items: center; gap: 7px;
  }
  .ai-section { margin-bottom: 14px; }
  .ai-section-label {
    font-size: .78rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; color: #7c3aed; margin-bottom: 6px;
  }
  .ai-text { font-size: .88rem; color: var(--ink); line-height: 1.6; }
  .ingredient-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .ingredient-chip {
    background: white; border: 1px solid #c4b5fd;
    color: #5b21b6; border-radius: 20px;
    padding: 3px 11px; font-size: .8rem; font-weight: 500;
  }
  .ai-loading {
    display: flex; align-items: center; gap: 10px;
    color: #5b21b6; font-size: .9rem; padding: 10px 0;
  }
  .spinner {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2.5px solid #c4b5fd;
    border-top-color: #7c3aed;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
     RECIPE BOOK VIEW
  в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ */
  .book-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
  }
  .book-title { font-size: 1.5rem; font-weight: 700; color: var(--ink); }
  .book-subtitle { font-size: .88rem; color: var(--ink-lt); margin-top: 2px; }

  .search-bar {
    display: flex; gap: 10px; align-items: center;
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 30px; padding: 7px 16px;
    width: 280px; transition: border-color .15s;
  }
  .search-bar:focus-within { border-color: var(--terracotta); }
  .search-bar input { border: none; outline: none; font-size: .9rem; color: var(--ink); width: 100%; background: transparent; }
  .search-icon { color: var(--ink-lt); font-size: 1rem; }

  .filter-bar {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
    padding-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .filter-pill {
    padding: 5px 14px; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--white);
    font-size: .82rem; font-weight: 500; color: var(--ink-md);
    cursor: pointer; transition: all .15s;
  }
  .filter-pill:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .filter-pill.active { background: var(--terracotta); border-color: var(--terracotta); color: white; }

  /* Cards grid */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  .recipe-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
